name: Docker Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for the Docker image'
        required: true
        type: string
      image-name:
        description: 'Docker image name (defaults to repo name)'
        required: false
        type: string
        default: ''
      build-args:
        description: 'Additional Docker build arguments (one per line)'
        required: false
        type: string
        default: ''
      komodo-stack:
        description: 'Komodo stack name to deploy after push (leave empty to skip)'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      tag:
        description: 'Version tag for the Docker image'
        required: true
        type: string
      image-name:
        description: 'Docker image name (defaults to repo name)'
        required: false
        type: string
        default: ''
      build-args:
        description: 'Additional Docker build arguments (one per line)'
        required: false
        type: string
        default: ''
      komodo-stack:
        description: 'Komodo stack name to deploy after push (leave empty to skip)'
        required: false
        type: string
        default: ''
    secrets:
      GH_PAT:
        required: true
      KOMODO_API_KEY:
        required: false
      KOMODO_API_SECRET:
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: image
        run: |
          IMAGE_NAME="${{ inputs.image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${GITHUB_REPOSITORY##*/}"
          fi
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            GH_PAT=${{ secrets.GH_PAT }}
            ${{ inputs.build-args }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Komodo
        if: ${{ inputs.komodo-stack != '' }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST https://komodo.bluefunda.com/execute \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: ${{ secrets.KOMODO_API_KEY }}" \
            -H "X-API-SECRET: ${{ secrets.KOMODO_API_SECRET }}" \
            -d '{"type":"DeployStack","params":{"stack":"${{ inputs.komodo-stack }}"}}')
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)
          echo "HTTP $http_code: $body"
          [[ "$http_code" -ge 200 && "$http_code" -lt 300 ]]