name: Docker Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for the Docker image'
        required: true
        type: string
      image-name:
        description: 'Docker image name (defaults to repo name)'
        required: false
        type: string
        default: ''
      build-args:
        description: 'Additional Docker build arguments (one per line)'
        required: false
        type: string
        default: ''
      komodo-stack:
        description: 'Komodo stack name — updates stacks/<subdir>/<name>/compose.yaml in gitops'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      tag:
        description: 'Version tag for the Docker image'
        required: true
        type: string
      image-name:
        description: 'Docker image name (defaults to repo name)'
        required: false
        type: string
        default: ''
      build-args:
        description: 'Additional Docker build arguments (one per line)'
        required: false
        type: string
        default: ''
      komodo-stack:
        description: 'Komodo stack name — updates stacks/<subdir>/<name>/compose.yaml in gitops'
        required: false
        type: string
        default: ''
    secrets:
      GH_PAT:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: image
        run: |
          IMAGE_NAME="${{ inputs.image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${GITHUB_REPOSITORY##*/}"
          fi
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            GH_PAT=${{ secrets.GH_PAT }}
            ${{ inputs.build-args }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in gitops
        if: ${{ inputs.komodo-stack != '' }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone "https://x-access-token:${GH_PAT}@github.com/bluefunda/gitops.git" /tmp/gitops
          cd /tmp/gitops

          COMPOSE_FILE=$(find stacks -path "*/${{ inputs.komodo-stack }}/compose.yaml" | head -1)
          if [ -z "$COMPOSE_FILE" ]; then
            echo "::warning::No compose file found for stack ${{ inputs.komodo-stack }} — skipping gitops update"
            exit 0
          fi

          IMAGE_NAME="${{ steps.image.outputs.name }}"
          OWNER="${{ github.repository_owner }}"
          sed -i "s|ghcr.io/${OWNER}/${IMAGE_NAME}:.*|ghcr.io/${OWNER}/${IMAGE_NAME}:${{ inputs.tag }}|" "$COMPOSE_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$COMPOSE_FILE"
          if git diff --staged --quiet; then
            echo "No changes — gitops already up to date"
          else
            git commit -m "chore: deploy ${{ inputs.komodo-stack }} ${{ inputs.tag }}"
            git push
          fi
