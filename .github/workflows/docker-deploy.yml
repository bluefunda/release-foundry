name: Docker Deploy

on:
  workflow_call:
    inputs:
      tag:
        description: 'Version tag for the Docker image'
        required: true
        type: string
      image-name:
        description: 'Docker image name (defaults to repo name)'
        required: false
        type: string
        default: ''
      build-args:
        description: 'Additional Docker build arguments (one per line)'
        required: false
        type: string
        default: ''
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      GH_PAT:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine image name
        id: image
        run: |
          IMAGE_NAME="${{ inputs.image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${GITHUB_REPOSITORY##*/}"
          fi
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            GH_PAT=${{ secrets.GH_PAT }}
            ${{ inputs.build-args }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.image.outputs.name }}:${{ inputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
