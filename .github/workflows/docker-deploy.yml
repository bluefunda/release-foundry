name: Docker Deploy

# Reusable workflow: builds a multi-arch Docker image, pushes to GHCR,
# and optionally updates a compose file in a gitops repository.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for the Docker image (e.g. v1.2.3)'
        required: true
        type: string
      image-name:
        description: 'Docker image name (defaults to the calling repo name)'
        required: false
        type: string
        default: ''
      build-args:
        description: 'Additional Docker build arguments (one per line)'
        required: false
        type: string
        default: ''
      gitops-repo:
        description: 'GitOps repo to update (org/repo). Leave empty to skip gitops update.'
        required: false
        type: string
        default: ''
      gitops-compose-path:
        description: 'Path to the compose.yaml inside the gitops repo. Required when gitops-repo is set.'
        required: false
        type: string
        default: ''
      komodo-stack:
        description: >
          (Deprecated) Komodo stack name. Used to locate the compose.yaml via find
          when gitops-repo is set but gitops-compose-path is not.
          Prefer gitops-compose-path for an explicit path.
        required: false
        type: string
        default: ''
      runner:
        description: 'Runner label. Defaults to self-hosted.'
        required: false
        type: string
        default: 'self-hosted'
  workflow_call:
    inputs:
      tag:
        description: 'Version tag for the Docker image (e.g. v1.2.3)'
        required: true
        type: string
      image-name:
        description: 'Docker image name (defaults to the calling repo name)'
        required: false
        type: string
        default: ''
      build-args:
        description: 'Additional Docker build arguments (one per line)'
        required: false
        type: string
        default: ''
      gitops-repo:
        description: 'GitOps repo to update (org/repo). Leave empty to skip gitops update.'
        required: false
        type: string
        default: ''
      gitops-compose-path:
        description: 'Path to the compose.yaml inside the gitops repo. Required when gitops-repo is set.'
        required: false
        type: string
        default: ''
      komodo-stack:
        description: >
          (Deprecated) Komodo stack name. Used to locate the compose.yaml via find
          when gitops-repo is set but gitops-compose-path is not.
          Prefer gitops-compose-path for an explicit path.
        required: false
        type: string
        default: ''
      runner:
        description: 'Runner label. Defaults to self-hosted.'
        required: false
        type: string
        default: 'self-hosted'
    secrets:
      GH_PAT:
        description: 'GitHub PAT with write access to the gitops repo (only needed when gitops-repo is set).'
        required: false

jobs:
  build-and-push:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Docker host for rootless Docker
        run: |
          if [ ! -S /var/run/docker.sock ] && [ -S "/run/user/$(id -u)/docker.sock" ]; then
            echo "DOCKER_HOST=unix:///run/user/$(id -u)/docker.sock" >> "$GITHUB_ENV"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: image
        run: |
          IMAGE_NAME="${{ inputs.image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${GITHUB_REPOSITORY##*/}"
          fi
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Prepare build args
        id: build-args
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          ARGS="${{ inputs.build-args }}"
          if [ -n "$GH_PAT" ]; then
            [ -n "$ARGS" ] && ARGS="${ARGS}"$'\n'"GH_PAT=${GH_PAT}" || ARGS="GH_PAT=${GH_PAT}"
          fi
          DELIM=$(openssl rand -hex 8)
          echo "value<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "${ARGS}" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: ${{ steps.build-args.outputs.value }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in gitops repo
        if: inputs.gitops-repo != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::warning::GH_PAT not set — skipping gitops update"
            exit 0
          fi

          git clone "https://x-access-token:${GH_PAT}@github.com/${{ inputs.gitops-repo }}.git" /tmp/gitops
          cd /tmp/gitops

          # Resolve compose file path: explicit path takes precedence over komodo-stack search.
          COMPOSE_FILE="${{ inputs.gitops-compose-path }}"
          if [ -z "$COMPOSE_FILE" ] && [ -n "${{ inputs.komodo-stack }}" ]; then
            COMPOSE_FILE=$(find stacks -name "compose.yaml" -path "*/${{ inputs.komodo-stack }}/compose.yaml" | head -1)
            if [ -z "$COMPOSE_FILE" ]; then
              echo "::warning::No compose.yaml found for stack '${{ inputs.komodo-stack }}' — skipping gitops update"
              exit 0
            fi
          fi
          if [ -z "$COMPOSE_FILE" ]; then
            echo "::warning::No gitops-compose-path or komodo-stack set — skipping gitops update"
            exit 0
          fi
          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "::warning::Compose file not found at $COMPOSE_FILE — skipping gitops update"
            exit 0
          fi

          IMAGE_NAME="${{ steps.image.outputs.name }}"
          OWNER="${{ github.repository_owner }}"
          sed -i "s|ghcr.io/${OWNER}/${IMAGE_NAME}:.*|ghcr.io/${OWNER}/${IMAGE_NAME}:${{ inputs.tag }}|" "$COMPOSE_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$COMPOSE_FILE"
          if git diff --staged --quiet; then
            echo "No changes — gitops already up to date"
          else
            git commit -m "chore: update $COMPOSE_FILE to ${{ inputs.tag }}"
            git push
          fi
