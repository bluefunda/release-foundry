name: Docker Deploy

# Reusable workflow: builds a multi-arch Docker image and pushes to GHCR.
# Image is published as ghcr.io/<org>/<repo>:<tag> and ghcr.io/<org>/<repo>:latest.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for the Docker image (e.g. v1.2.3)'
        required: true
        type: string
      image-name:
        description: 'Docker image name (defaults to the calling repo name)'
        required: false
        type: string
        default: ''
      build-args:
        description: 'Additional Docker build arguments (one per line)'
        required: false
        type: string
        default: ''
      platforms:
        description: 'Docker build platforms (comma-separated). Defaults to linux/amd64. Pass linux/amd64,linux/arm64 for multi-arch (requires a privileged runner with QEMU support).'
        required: false
        type: string
        default: 'linux/amd64'
      runner:
        description: 'Runner label. Defaults to ubuntu-latest (GitHub-hosted). Pass self-hosted for private repos.'
        required: false
        type: string
        default: 'ubuntu-latest'
  workflow_call:
    inputs:
      tag:
        description: 'Version tag for the Docker image (e.g. v1.2.3)'
        required: true
        type: string
      image-name:
        description: 'Docker image name (defaults to the calling repo name)'
        required: false
        type: string
        default: ''
      build-args:
        description: 'Additional Docker build arguments (one per line)'
        required: false
        type: string
        default: ''
      platforms:
        description: 'Docker build platforms (comma-separated). Defaults to linux/amd64. Pass linux/amd64,linux/arm64 for multi-arch (requires a privileged runner with QEMU support).'
        required: false
        type: string
        default: 'linux/amd64'
      runner:
        description: 'Runner label. Defaults to ubuntu-latest (GitHub-hosted). Pass self-hosted for private repos.'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      GH_PAT:
        description: 'GitHub PAT for private module access. Injected as GH_PAT build arg when set.'
        required: false

jobs:
  build-and-push:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Docker host for rootless Docker
        run: |
          if [ ! -S /var/run/docker.sock ] && [ -S "/run/user/$(id -u)/docker.sock" ]; then
            echo "DOCKER_HOST=unix:///run/user/$(id -u)/docker.sock" >> "$GITHUB_ENV"
          fi
          # Add rootless Docker binary to PATH if not already present
          if ! command -v docker &>/dev/null; then
            for dir in "$HOME/.local/bin" "$HOME/bin" "/usr/local/bin"; do
              if [ -x "$dir/docker" ]; then
                echo "$dir" >> "$GITHUB_PATH"
                break
              fi
            done
          fi

      - name: Set up QEMU
        if: contains(inputs.platforms, 'arm64') || contains(inputs.platforms, 'arm/v')
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v8.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: image
        run: |
          IMAGE_NAME="${{ inputs.image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${GITHUB_REPOSITORY##*/}"
          fi
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Prepare build args
        id: build-args
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          ARGS="${{ inputs.build-args }}"
          if [ -n "$GH_PAT" ]; then
            [ -n "$ARGS" ] && ARGS="${ARGS}"$'\n'"GH_PAT=${GH_PAT}" || ARGS="GH_PAT=${GH_PAT}"
          fi
          DELIM=$(openssl rand -hex 8)
          echo "value<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "${ARGS}" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ inputs.platforms }}
          build-args: ${{ steps.build-args.outputs.value }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
