name: Go Binary Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to build'
        required: true
        type: string
      goreleaser-version:
        description: 'GoReleaser version'
        required: false
        type: string
        default: '~> v2'
      goreleaser-args:
        description: 'GoReleaser arguments'
        required: false
        type: string
        default: 'release --clean'
      test-command:
        description: 'Test command to run before release'
        required: false
        type: string
        default: 'go test -race -count=1 ./...'
      goprivate:
        description: >
          GOPRIVATE value for private module access.
          Set to 'github.com/bluefunda/*' for repos with private bluefunda deps.
          Leave empty for public/OSS repos that have no private dependencies.
        required: false
        type: string
        default: 'github.com/bluefunda/*'
    secrets:
      GH_PAT:
        description: 'GitHub PAT for private module access via git. Only needed when goprivate is set and modules require authentication.'
        required: false
      HOMEBREW_TAP_TOKEN:
        required: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GOPRIVATE: ${{ inputs.goprivate }}
    steps:
      - name: Configure Git for private modules
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ${{ inputs.goreleaser-version }}
          args: ${{ inputs.goreleaser-args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
