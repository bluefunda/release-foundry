name: Go Binary Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.2.3)'
        required: true
        type: string
      goreleaser-version:
        description: 'GoReleaser version'
        required: false
        type: string
        default: '~> v2'
      goreleaser-args:
        description: 'GoReleaser arguments'
        required: false
        type: string
        default: 'release --clean'
      test-command:
        description: 'Test command to run before release'
        required: false
        type: string
        default: 'go test -race -count=1 ./...'
      goreleaser-config:
        description: 'Path to .goreleaser.yml (for monorepos). Defaults to root .goreleaser.yml.'
        required: false
        type: string
        default: ''
      go-version-file:
        description: 'Path to go version file (go.mod or go.work). Defaults to go.mod.'
        required: false
        type: string
        default: 'go.mod'
      goprivate:
        description: >
          GOPRIVATE value for private module access.
          Leave empty for public/OSS repos that have no private dependencies.
        required: false
        type: string
        default: ''
    secrets:
      GH_PAT:
        description: 'GitHub PAT for private module access via git. Only needed when goprivate is set.'
        required: false
      HOMEBREW_TAP_TOKEN:
        description: 'GitHub PAT with write access to the Homebrew tap repo.'
        required: false
      MACOS_CERTIFICATE:
        description: 'Base64-encoded Developer ID Application certificate (.p12).'
        required: false
      MACOS_CERTIFICATE_PWD:
        description: 'Password for the macOS certificate.'
        required: false
      NOTARIZATION_ISSUER_ID:
        description: 'App Store Connect API issuer ID for notarization.'
        required: false
      NOTARIZATION_KEY_ID:
        description: 'App Store Connect API key ID for notarization.'
        required: false
      NOTARIZATION_KEY:
        description: 'App Store Connect API private key (.p8 content) for notarization.'
        required: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: ${{ inputs.goprivate }}
    steps:
      - name: Configure Git for private modules
        if: inputs.goprivate != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - run: ${{ inputs.test-command }}

  goreleaser:
    needs: test
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      GOPRIVATE: ${{ inputs.goprivate }}
    steps:
      - name: Configure Git for private modules
        if: inputs.goprivate != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ${{ inputs.goreleaser-version }}
          args: ${{ inputs.goreleaser-args }}${{ inputs.goreleaser-config != '' && format(' --config {0}', inputs.goreleaser-config) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          NOTARIZATION_ISSUER_ID: ${{ secrets.NOTARIZATION_ISSUER_ID }}
          NOTARIZATION_KEY_ID: ${{ secrets.NOTARIZATION_KEY_ID }}
          NOTARIZATION_KEY: ${{ secrets.NOTARIZATION_KEY }}
