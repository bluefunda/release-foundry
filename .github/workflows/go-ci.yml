name: Go CI

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use (defaults to version in go.mod)'
        required: false
        type: string
        default: ''
      goprivate:
        description: >
          GOPRIVATE value for private module access.
          Leave empty for public/OSS repos. Set to e.g. 'github.com/myorg/*'
          only when the repo has private Go module dependencies.
        required: false
        type: string
        default: ''
      build-command:
        required: false
        type: string
        default: 'go build ./...'
      test-command:
        required: false
        type: string
        default: 'go test -race ./...'
      golangci-lint-version:
        required: false
        type: string
        default: 'v2.11.4'
      run-codecov:
        required: false
        type: boolean
        default: false
      run-protobuf:
        required: false
        type: boolean
        default: false
      runner:
        description: 'Runner label. Defaults to self-hosted.'
        required: false
        type: string
        default: 'self-hosted'
    secrets:
      GH_PAT:
        description: 'GitHub PAT for private module access. Required when goprivate is set.'
        required: false

jobs:
  test:
    name: Test
    runs-on: ${{ inputs.runner }}
    env:
      GOPRIVATE: ${{ inputs.goprivate }}
    steps:
      - name: Configure Git for private modules
        if: inputs.goprivate != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version || '' }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          cache: true

      - name: Install protoc tools
        if: inputs.run-protobuf
        run: |
          sudo apt-get update -q && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files
        if: inputs.run-protobuf
        run: make proto

      - run: go mod download
      - run: ${{ inputs.test-command }}

      - name: Upload coverage
        if: inputs.run-codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt

  build:
    name: Build
    runs-on: ${{ inputs.runner }}
    env:
      GOPRIVATE: ${{ inputs.goprivate }}
    steps:
      - name: Configure Git for private modules
        if: inputs.goprivate != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version || '' }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          cache: true

      - name: Install protoc tools
        if: inputs.run-protobuf
        run: |
          sudo apt-get update -q && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files
        if: inputs.run-protobuf
        run: make proto

      - run: go mod download
      - run: ${{ inputs.build-command }}

  lint:
    name: Lint
    runs-on: ${{ inputs.runner }}
    env:
      GOPRIVATE: ${{ inputs.goprivate }}
    steps:
      - name: Configure Git for private modules
        if: inputs.goprivate != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version || '' }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          cache: true

      - name: Install protoc tools
        if: inputs.run-protobuf
        run: |
          sudo apt-get update -q && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files
        if: inputs.run-protobuf
        run: make proto

      - run: go mod download

      - uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ inputs.golangci-lint-version }}
