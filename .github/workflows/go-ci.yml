name: Go CI

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.25'
      golangci-lint-version:
        description: 'golangci-lint version'
        required: false
        type: string
        default: 'v2.9.0'
      run-protobuf:
        description: 'Generate protobuf files before build/test/lint'
        required: false
        type: boolean
        default: false
      build-command:
        description: 'Build command to run'
        required: false
        type: string
        default: 'go build ./...'
      test-command:
        description: 'Test command to run'
        required: false
        type: string
        default: 'go test -v -race ./...'
      run-codecov:
        description: 'Upload coverage to Codecov'
        required: false
        type: boolean
        default: false
    secrets:
      GH_PAT:
        description: 'Personal access token for private Go module access. Only needed when GOPRIVATE imports are used.'
        required: false

env:
  GOPRIVATE: github.com/bluefunda/*

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git for private modules
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Install protoc
        if: ${{ inputs.run-protobuf }}
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install proto tools
        if: ${{ inputs.run-protobuf }}
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files
        if: ${{ inputs.run-protobuf }}
        run: make proto

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Upload coverage
        if: ${{ inputs.run-codecov }}
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git for private modules
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Install protoc
        if: ${{ inputs.run-protobuf }}
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install proto tools
        if: ${{ inputs.run-protobuf }}
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files
        if: ${{ inputs.run-protobuf }}
        run: make proto

      - name: Build
        run: ${{ inputs.build-command }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git for private modules
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Install protoc
        if: ${{ inputs.run-protobuf }}
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install proto tools
        if: ${{ inputs.run-protobuf }}
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files
        if: ${{ inputs.run-protobuf }}
        run: make proto

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ inputs.golangci-lint-version }}
