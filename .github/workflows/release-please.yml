name: Release Please

on:
  workflow_call:
    inputs:
      release-type:
        description: 'Release-please release type (go, node, simple, etc.)'
        required: false
        type: string
        default: 'go'
      runner:
        description: 'Runner label. Defaults to ubuntu-latest (GitHub-hosted). Pass self-hosted for private repos.'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      GH_PAT:
        description: 'GitHub PAT to trigger downstream workflows from release-please commits'
        required: false
    outputs:
      release_created:
        description: 'Whether a release was created'
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: 'The tag name of the release'
        value: ${{ jobs.release-please.outputs.tag_name }}

jobs:
  release-please:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: googleapis/release-please-action@v4.1.3
        id: release
        with:
          release-type: ${{ inputs.release-type }}
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Auto-approve and merge release-please PR
        if: ${{ steps.release.outputs.pr != '' }}
        env:
          # github.token (github-actions[bot]) approves the PR created by GH_PAT (devops-bda)
          # — different actors, so GitHub allows the approval.
          GH_TOKEN: ${{ github.token }}
          # Pass the release-please PR JSON and merge token through the environment
          # rather than inlining ${{ }} into the script. The PR body can contain
          # apostrophes/parens (e.g. a commit like "don't 400 (#132)") that would
          # otherwise break out of the shell quoting — GitHub's own guidance is to
          # never interpolate expression values directly into run: scripts.
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          MERGE_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          PR_NUMBER=$(printf '%s' "$RELEASE_PR" | jq -r '.number // empty')
          [ -z "$PR_NUMBER" ] && exit 0
          echo "Auto-approving release-please PR #${PR_NUMBER}"
          gh pr review "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --approve --body "Auto-approved by CI — release-please version bump, no functional changes."
          echo "Enabling auto-merge on PR #${PR_NUMBER}"
          GH_TOKEN="$MERGE_TOKEN" \
            gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --auto
