name: Go Docker Deploy

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name (defaults to repo name)'
        required: false
        type: string
        default: ''
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      GH_PAT:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine image name
        id: image
        run: |
          IMAGE_NAME="${{ inputs.image-name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${GITHUB_REPOSITORY##*/}"
          fi
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Determine Semantic Version from Commit Message
        id: semver
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch --tags --force

          LATEST_TAG=$(git tag | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          echo "Latest tag: $LATEST_TAG"

          LATEST_TAG=${LATEST_TAG#v}
          VERSION_MAJOR=$(echo "$LATEST_TAG" | cut -d '.' -f 1)
          VERSION_MINOR=$(echo "$LATEST_TAG" | cut -d '.' -f 2)
          VERSION_PATCH=$(echo "$LATEST_TAG" | cut -d '.' -f 3)

          LAST_COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          echo "Last commit message: $LAST_COMMIT_MESSAGE"

          if [[ "$LAST_COMMIT_MESSAGE" == *"[major]"* ]]; then
              VERSION_MAJOR=$((VERSION_MAJOR + 1))
              VERSION_MINOR=0
              VERSION_PATCH=0
          elif [[ "$LAST_COMMIT_MESSAGE" == *"[minor]"* ]]; then
              VERSION_MINOR=$((VERSION_MINOR + 1))
              VERSION_PATCH=0
          else
              VERSION_PATCH=$((VERSION_PATCH + 1))
          fi

          NEW_VERSION="v${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          echo "New version: $NEW_VERSION"

          if git rev-parse "refs/tags/$NEW_VERSION" >/dev/null 2>&1; then
              echo "Tag $NEW_VERSION already exists. Skipping tag creation."
          else
              git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
              git push origin "$NEW_VERSION"
          fi

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            GH_PAT=${{ secrets.GH_PAT }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
