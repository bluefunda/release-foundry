name: Manual Docker Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v1.2.3 or latest)'
        default: 'latest'
        required: false
        type: string

jobs:
  deploy:
    uses: ./.github/workflows/docker-deploy.yml
    with:
      tag: ${{ inputs.tag || 'latest' }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
