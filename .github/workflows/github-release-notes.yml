name: GitHub Release Notes

# Reusable workflow: populates a GitHub release body with structured release notes
# generated by release-foundry. Call this from your repo after a release is created.
#
# Usage:
#   release-notes:
#     needs: release-please
#     if: needs.release-please.outputs.release_created == 'true'
#     uses: <org>/release-foundry/.github/workflows/github-release-notes.yml@main
#     with:
#       tag: ${{ needs.release-please.outputs.tag_name }}
#     secrets:
#       GH_PAT: ${{ secrets.GH_PAT }}

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to annotate (e.g. v1.2.0)'
        required: true
        type: string
      mode:
        description: 'replace (overwrite release body) or append (add after existing body)'
        required: false
        type: string
        default: 'replace'
      days-fallback:
        description: 'Days to look back when no previous release exists'
        required: false
        type: number
        default: 30
      release-foundry-repo:
        description: 'release-foundry repo to build from (org/repo). Defaults to the repo that owns this workflow.'
        required: false
        type: string
        default: ''
      runner:
        description: 'Runner label. Defaults to self-hosted.'
        required: false
        type: string
        default: 'self-hosted'
    secrets:
      GH_PAT:
        description: 'GitHub PAT with repo read/write access'
        required: false

jobs:
  release-notes:
    name: Generate Release Notes
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
    steps:
      - name: Resolve release-foundry source repo
        id: rf-repo
        run: |
          RF_REPO="${{ inputs.release-foundry-repo }}"
          if [ -z "$RF_REPO" ]; then
            # github.workflow_ref resolves to the calling workflow in newer GitHub Actions runners,
            # not the reusable workflow — so derive the repo from the org name instead.
            RF_REPO="${{ github.repository_owner }}/release-foundry"
          fi
          echo "repo=$RF_REPO" >> "$GITHUB_OUTPUT"

      - name: Check out release-foundry
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.rf-repo.outputs.repo }}
          path: release-foundry-src
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: release-foundry-src/go.mod
          cache: true
          cache-dependency-path: release-foundry-src/go.sum

      - name: Build release-foundry binary
        working-directory: release-foundry-src
        run: go build -o ../rf ./cmd/release-foundry

      - name: Find previous release date
        id: prev-release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          PREV_TAG=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 5 \
            --json tagName,isDraft,isPrerelease \
            --jq '[.[] | select(.isDraft == false and .isPrerelease == false) | .tagName][1] // ""')
          if [ -n "$PREV_TAG" ]; then
            PREV_DATE=$(gh release view "$PREV_TAG" \
              --repo "${{ github.repository }}" \
              --json publishedAt \
              --jq .publishedAt)
            echo "since=$PREV_DATE" >> "$GITHUB_OUTPUT"
            echo "Previous release: $PREV_TAG ($PREV_DATE)"
          else
            echo "No previous release found; will use -days fallback"
          fi

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          SINCE="${{ steps.prev-release.outputs.since }}"
          mkdir -p ./release-notes-out

          if [ -n "$SINCE" ]; then
            ./rf -owner "$OWNER" -repo "$REPO" \
              -since "$SINCE" \
              -render github-release \
              -out ./release-notes-out
          else
            ./rf -owner "$OWNER" -repo "$REPO" \
              -days "${{ inputs.days-fallback }}" \
              -render github-release \
              -out ./release-notes-out
          fi

      - name: Update GitHub release body
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          NOTES_FILE=$(ls ./release-notes-out/*.md 2>/dev/null | head -1)
          if [ -z "$NOTES_FILE" ]; then
            echo "No release notes file generated; skipping release body update"
            exit 0
          fi

          echo "Updating release ${{ inputs.tag }} with notes from $NOTES_FILE"

          if [ "${{ inputs.mode }}" = "append" ]; then
            EXISTING=$(gh release view "${{ inputs.tag }}" \
              --repo "${{ github.repository }}" \
              --json body --jq .body)
            COMBINED="${EXISTING}"$'\n\n'"$(cat "$NOTES_FILE")"
            printf '%s' "$COMBINED" | gh release edit "${{ inputs.tag }}" \
              --repo "${{ github.repository }}" \
              --notes-file -
          else
            gh release edit "${{ inputs.tag }}" \
              --repo "${{ github.repository }}" \
              --notes-file "$NOTES_FILE"
          fi
          echo "Release body updated."
