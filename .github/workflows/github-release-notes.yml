name: GitHub Release Notes

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to annotate (e.g. v1.2.0)'
        required: true
        type: string
      mode:
        description: 'replace (overwrite release body) or append (add after existing body)'
        required: false
        type: string
        default: 'replace'
    secrets:
      GH_PAT:
        description: 'GitHub PAT — required to check out release-foundry and access private repos'
        required: false

jobs:
  release-notes:
    uses: bluefunda/.github/.github/workflows/github-release-notes.yml@main
    with:
      tag: ${{ inputs.tag }}
      mode: ${{ inputs.mode }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
