# repos.example.yml — example batch config for release-foundry
#
# Copy this to repos.yml (gitignored) and fill in your org/repos.
# Run: release-foundry -config repos.yml -days 7 -render github-release -out ./out

defaults:
  owner: myorg        # GitHub org or user that owns all repos below
  baseBranch: main    # default base branch (override per-repo if needed)

repos:
  # Minimal entry — inherits defaults above
  - repo: api-server

  # With edition tag (included in JSON output for segmenting output by tier)
  - repo: platform-pro
    edition: enterprise

  - repo: platform-community
    edition: free

  # With custom label overrides
  - repo: plugin-sdk
    includeLabels:
      - feature
      - fix
      - plugin
    excludeLabels:
      - internal
      - wip

  # Different base branch
  - repo: legacy-service
    baseBranch: release/v2
